<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VV Production Task Tracker</title>
<style>
  :root {
    --vv-red: #E4002B;
    --vv-dark: #1a1a2e;
    --vv-bg: #f8f7f4;
    --vv-card: #ffffff;
    --vv-border: #e5e5e5;
    --vv-text: #2c2c2c;
    --vv-muted: #6b6b6b;
    --vv-green: #2d8a56;
    --vv-amber: #d4930d;
    --vv-blue: #2563eb;
    --vv-purple: #7c3aed;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--vv-bg); color: var(--vv-text); line-height: 1.6; padding: 24px; }
  .container { max-width: 920px; margin: 0 auto; }
  .hidden { display: none !important; }

  /* Lock screen */
  #lock-screen {
    position: fixed; inset: 0; background: linear-gradient(135deg, var(--vv-dark) 0%, #2d1b4e 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999;
  }
  #lock-screen h2 { color: #fff; font-size: 22px; margin-bottom: 6px; }
  #lock-screen p { color: rgba(255,255,255,0.6); font-size: 13px; margin-bottom: 20px; }
  #lock-screen input {
    padding: 10px 16px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.25); background: rgba(255,255,255,0.1);
    color: #fff; font-size: 14px; width: 260px; outline: none; font-family: inherit;
  }
  #lock-screen input::placeholder { color: rgba(255,255,255,0.4); }
  #lock-screen input:focus { border-color: rgba(255,255,255,0.5); }
  #lock-screen button {
    margin-top: 10px; padding: 9px 28px; border-radius: 8px; border: none;
    background: var(--vv-red); color: #fff; font-size: 14px; font-weight: 600;
    cursor: pointer; font-family: inherit;
  }
  #lock-screen button:hover { opacity: 0.9; }
  #lock-error { color: #ff6b6b; font-size: 12px; margin-top: 8px; min-height: 16px; }

  #app-content { display: none; }
  #app-content.unlocked { display: block; }

  /* Header */
  .header {
    background: linear-gradient(135deg, var(--vv-dark) 0%, #2d1b4e 100%);
    color: white; padding: 28px 32px; border-radius: 16px; margin-bottom: 20px;
    display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;
  }
  .header h1 { font-size: 24px; font-weight: 700; }
  .header .subtitle { font-size: 14px; color: rgba(255,255,255,0.65); margin-top: 2px; }
  .header-right { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .header-stats { display: flex; gap: 10px; flex-wrap: wrap; }
  .stat-pill { background: rgba(255,255,255,0.12); padding: 5px 14px; border-radius: 20px; font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.9); }
  .stat-pill.done { background: rgba(45,138,86,0.35); }
  .stat-pill.remaining { background: rgba(228,0,43,0.3); }

  /* Sync bar */
  .sync-bar {
    display: flex; align-items: center; gap: 8px; margin-bottom: 16px; font-size: 12px; color: var(--vv-muted);
  }
  #sync-btn {
    padding: 4px 12px; border-radius: 14px; border: 1px solid var(--vv-border); background: var(--vv-card);
    font-size: 11px; cursor: pointer; font-family: inherit; color: var(--vv-muted);
  }
  #sync-btn:hover { background: #f0f0f0; color: var(--vv-dark); }
  .color-toggle-btn {
    padding: 4px 12px; border-radius: 14px; border: 1px solid var(--vv-border); background: var(--vv-card);
    font-size: 11px; cursor: pointer; font-family: inherit; color: var(--vv-muted);
  }
  .color-toggle-btn:hover { background: #f0f0f0; color: var(--vv-dark); }

  /* Assignee color settings */
  .color-settings {
    background: var(--vv-card); border: 1px solid var(--vv-border); border-radius: 10px;
    padding: 14px 18px; margin-bottom: 14px;
  }
  .color-settings h4 { font-size: 13px; margin-bottom: 8px; color: var(--vv-dark); }
  .color-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .color-row span { font-size: 13px; min-width: 70px; }
  .color-row select { padding: 3px 8px; border-radius: 6px; border: 1px solid var(--vv-border); font-size: 12px; font-family: inherit; }

  /* Global progress */
  .global-progress { background: var(--vv-card); border-radius: 12px; padding: 14px 24px; margin-bottom: 16px; border: 1px solid var(--vv-border); display: flex; align-items: center; gap: 14px; }
  .progress-bar-outer { flex: 1; background: #f0f0f0; border-radius: 8px; height: 10px; overflow: hidden; }
  .progress-bar-inner { height: 100%; background: linear-gradient(90deg, var(--vv-green), #34d399); border-radius: 8px; transition: width 0.4s ease; }
  .progress-label { font-size: 14px; font-weight: 600; min-width: 50px; text-align: right; }

  /* Tabs */
  .tabs { display: flex; gap: 4px; margin-bottom: 0; flex-wrap: wrap; align-items: flex-end; }
  .tab {
    padding: 8px 16px; border-radius: 10px 10px 0 0; border: 1px solid var(--vv-border); border-bottom: none;
    background: var(--vv-card); font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit;
    color: var(--vv-muted); transition: all 0.15s; position: relative; top: 1px; text-align: left;
  }
  .tab:hover { color: var(--vv-dark); }
  .tab.active { background: var(--vv-card); color: var(--vv-dark); border-bottom: 2px solid var(--vv-card); z-index: 2; }
  .tab .tab-count {
    display: inline-block; background: #f0f0f0; color: var(--vv-muted);
    font-size: 11px; padding: 1px 7px; border-radius: 10px; margin-left: 6px; font-weight: 700;
  }
  .tab.active .tab-count { background: var(--vv-dark); color: white; }
  .tab .tab-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-left: 6px; }
  .tab-date { display: block; font-size: 10px; font-weight: 500; color: var(--vv-muted); margin-top: 1px; }
  .tab.active .tab-date { color: var(--vv-muted); }
  .tab-date.urgent { color: var(--vv-red); font-weight: 700; }
  .tab-date.soon { color: var(--vv-amber); font-weight: 600; }
  .tab-add {
    padding: 8px 14px; border-radius: 10px 10px 0 0; border: 1px dashed var(--vv-border); border-bottom: none;
    background: transparent; font-size: 18px; font-weight: 400; cursor: pointer; font-family: inherit;
    color: var(--vv-muted); transition: all 0.15s; position: relative; top: 1px; line-height: 1;
  }
  .tab-add:hover { color: var(--vv-dark); background: var(--vv-card); border-style: solid; }

  /* Project header bar */
  .project-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
  .project-title { font-size: 18px; font-weight: 700; }
  .shoot-date-badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 4px 12px; border-radius: 16px; font-size: 12px; font-weight: 600;
  }
  .shoot-date-badge.urgent { background: #fef2f2; color: var(--vv-red); }
  .shoot-date-badge.soon { background: #fffbeb; color: var(--vv-amber); }
  .shoot-date-badge.future { background: #eff6ff; color: var(--vv-blue); }
  .shoot-date-badge.no-date { background: #f3f3f3; color: var(--vv-muted); }
  .btn-edit-project {
    margin-left: auto; background: none; border: 1px solid var(--vv-border); border-radius: 6px;
    padding: 4px 10px; font-size: 11px; cursor: pointer; font-family: inherit; color: var(--vv-muted);
  }
  .btn-edit-project:hover { background: #f3f3f3; color: var(--vv-dark); }
  .btn-delete-project { background: none; border: 1px solid var(--vv-border); border-radius: 6px; padding: 4px 10px; font-size: 11px; cursor: pointer; font-family: inherit; color: var(--vv-muted); }
  .btn-delete-project:hover { background: #fef2f2; color: var(--vv-red); }

  /* Filter bar */
  .filter-bar { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
  .filter-btn {
    padding: 5px 12px; border-radius: 16px; border: 1px solid var(--vv-border); background: var(--vv-card);
    font-size: 12px; cursor: pointer; font-family: inherit; color: var(--vv-muted); transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--vv-dark); color: var(--vv-dark); }
  .filter-btn.active { background: var(--vv-dark); color: white; border-color: var(--vv-dark); }
  .sort-select {
    padding: 5px 10px; border-radius: 16px; border: 1px solid var(--vv-border); background: var(--vv-card);
    font-size: 12px; font-family: inherit; cursor: pointer; outline: none; color: var(--vv-muted);
  }
  .sort-select:focus { border-color: var(--vv-blue); }
  .sort-label { font-size: 11px; color: var(--vv-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
  .filter-search {
    margin-left: auto; padding: 5px 12px; border-radius: 16px; border: 1px solid var(--vv-border);
    font-size: 12px; font-family: inherit; outline: none; width: 180px;
  }
  .filter-search:focus { border-color: var(--vv-blue); }

  /* Section */
  .section { background: var(--vv-card); border-radius: 0 12px 12px 12px; padding: 24px; margin-bottom: 16px; border: 1px solid var(--vv-border); }

  /* Task list */
  .task-list { list-style: none; }
  .task-item { padding: 11px 0; border-bottom: 1px solid var(--vv-border); transition: opacity 0.3s ease; }
  .task-item:last-child { border-bottom: none; }
  .task-row { display: flex; align-items: flex-start; gap: 10px; }
  .task-item.completed > .task-row { opacity: 0.4; }
  .task-item.completed > .task-row .task-text strong { text-decoration: line-through; color: var(--vv-muted); }
  .task-list input[type="checkbox"] { width: 17px; height: 17px; flex-shrink: 0; margin-top: 3px; cursor: pointer; accent-color: var(--vv-green); }
  .task-text { flex: 1; }
  .task-text strong { color: var(--vv-dark); font-size: 14px; }
  .task-meta { font-size: 12px; color: var(--vv-muted); margin-top: 2px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .owner-badge { display: inline-block; padding: 1px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
  .due-badge { display: inline-block; padding: 1px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
  .due-badge.overdue { background: #fef2f2; color: var(--vv-red); }
  .due-badge.due-today { background: #fef2f2; color: var(--vv-red); }
  .due-badge.due-soon { background: #fffbeb; color: var(--vv-amber); }
  .due-badge.due-future { background: #eff6ff; color: var(--vv-blue); }
  .priority-high { color: var(--vv-red); font-weight: 600; }
  .priority-medium { color: var(--vv-amber); font-weight: 600; }
  .priority-low { color: var(--vv-green); font-weight: 600; }

  /* Hover actions */
  .task-actions { display: flex; gap: 4px; margin-left: auto; opacity: 0; transition: opacity 0.2s; flex-shrink: 0; }
  .task-row:hover .task-actions { opacity: 1; }
  .btn-icon { background: none; border: 1px solid var(--vv-border); border-radius: 4px; cursor: pointer; font-size: 11px; padding: 2px 6px; color: var(--vv-muted); transition: all 0.15s; font-family: inherit; }
  .btn-icon:hover { background: #f3f3f3; color: var(--vv-dark); }
  .btn-icon.delete:hover { background: #fef2f2; color: var(--vv-red); }

  /* Inline edit form */
  .edit-form { background: #fafafa; border: 1px solid var(--vv-blue); border-radius: 10px; padding: 14px; margin-top: 8px; }
  .edit-form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .edit-form-grid.full { grid-template-columns: 1fr; }
  .edit-field label { display: block; font-size: 11px; font-weight: 600; color: var(--vv-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; }
  .edit-field input[type="text"], .edit-field input[type="date"], .edit-field select {
    width: 100%; padding: 7px 10px; border: 1px solid var(--vv-border); border-radius: 6px;
    font-size: 13px; font-family: inherit; outline: none; background: white;
  }
  .edit-field input:focus, .edit-field select:focus { border-color: var(--vv-blue); }
  .edit-btns { display: flex; gap: 6px; margin-top: 10px; }
  .btn-save { padding: 6px 16px; background: var(--vv-blue); color: white; border: none; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .btn-save:hover { opacity: 0.9; }
  .btn-cancel { padding: 6px 16px; background: #f0f0f0; color: var(--vv-muted); border: none; border-radius: 6px; font-size: 12px; cursor: pointer; font-family: inherit; }
  .btn-cancel:hover { background: #e5e5e5; }

  /* Add task form */
  .add-form { background: #fafafa; border: 1px dashed var(--vv-border); border-radius: 10px; padding: 14px; margin-top: 14px; }
  .add-form-row { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .add-form-row:last-child { margin-bottom: 0; }
  .add-form input[type="text"], .add-form input[type="date"] { flex: 1; min-width: 120px; padding: 7px 12px; border: 1px solid var(--vv-border); border-radius: 8px; font-size: 13px; font-family: inherit; outline: none; }
  .add-form input[type="text"]:focus, .add-form input[type="date"]:focus { border-color: var(--vv-blue); }
  .add-form select { padding: 7px 10px; border: 1px solid var(--vv-border); border-radius: 8px; font-size: 12px; font-family: inherit; outline: none; background: white; cursor: pointer; }
  .btn-add { padding: 7px 16px; background: var(--vv-dark); color: white; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; font-family: inherit; transition: background 0.2s; }
  .btn-add:hover { background: #2d1b4e; }

  /* New project inline form */
  .new-project-form { background: var(--vv-card); border: 1px solid var(--vv-blue); border-radius: 12px; padding: 18px; margin-bottom: 16px; }
  .new-project-form h3 { font-size: 15px; margin-bottom: 10px; }

  /* Empty state */
  .empty-state { text-align: center; padding: 32px 16px; color: var(--vv-muted); font-size: 14px; }
  .footer { text-align: center; font-size: 12px; color: var(--vv-muted); margin-top: 12px; padding: 8px; }

  @media (max-width: 600px) {
    body { padding: 12px; }
    .header { padding: 20px; }
    .header h1 { font-size: 20px; }
    .filter-search { width: 100%; margin-left: 0; }
    .tab { padding: 6px 10px; font-size: 12px; }
  }
</style>
</head>

<!-- ====== PASSWORD GATE ====== -->
<div id="lock-screen">
  <h2>VV Production Tracker</h2>
  <p>Enter the team password to continue</p>
  <input type="password" id="lock-input" placeholder="Password">
  <button id="lock-btn">Enter</button>
  <div id="lock-error"></div>
</div>

<!-- ====== APP ====== -->
<div id="app-content">
<div class="container">
  <div class="header">
    <div>
      <h1>VV Production Task Tracker</h1>
      <div class="subtitle">Virgin Voyages &middot; Production Team</div>
    </div>
    <div class="header-right">
      <div class="header-stats">
        <span class="stat-pill done" id="stat-done">0 done</span>
        <span class="stat-pill remaining" id="stat-remaining">0 remaining</span>
      </div>
    </div>
  </div>

  <!-- Sync bar -->
  <div class="sync-bar">
    <button id="sync-btn" onclick="fetchAll()">Refresh</button>
    <span id="sync-msg">Not connected</span>
    <button class="color-toggle-btn" onclick="toggleColorSettings()">Assignee Colors</button>
  </div>

  <div id="color-settings-container"></div>

  <div class="global-progress">
    <div class="progress-bar-outer"><div class="progress-bar-inner" id="progress-fill" style="width:0%"></div></div>
    <div class="progress-label" id="progress-label">0%</div>
  </div>

  <div class="tabs" id="tab-bar"></div>
  <div id="new-project-container"></div>

  <div class="section" id="main-section">
    <div class="project-header" id="project-header"></div>
    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="pending">Pending</button>
      <button class="filter-btn" data-filter="done">Completed</button>
      <button class="filter-btn" data-filter="high">High Priority</button>
      <button class="filter-btn" data-filter="overdue">Overdue</button>
      <span class="sort-label">Sort:</span>
      <select class="sort-select" id="sort-select">
        <option value="due-asc">Due Date (soonest)</option>
        <option value="due-desc">Due Date (latest)</option>
        <option value="priority">Priority</option>
        <option value="assignee">Assignee</option>
        <option value="name">Name (A-Z)</option>
        <option value="created">Newest First</option>
      </select>
      <input type="text" class="filter-search" id="search-input" placeholder="Search tasks...">
    </div>
    <ul class="task-list" id="task-list"></ul>
    <div class="add-form">
      <div class="add-form-row">
        <input type="text" id="new-task" placeholder="New task name...">
        <select id="new-priority"><option value="High">High</option><option value="Medium" selected>Medium</option><option value="Low">Low</option></select>
        <select id="new-assignee"><option value="">Assignee...</option><option>Alfred</option><option>Vanessa</option><option>Kathy</option><option>Alberto</option></select>
        <input type="date" id="new-due" title="Due date" style="max-width:150px;">
        <button class="btn-add" id="add-task-btn">+ Add Task</button>
      </div>
      <div class="add-form-row">
        <input type="text" id="new-detail" placeholder="Details / notes (optional)" style="flex:1;">
      </div>
    </div>
  </div>

  <div class="footer">VV Production Task Tracker &middot; Shared team board &middot; Synced with Airtable</div>
</div>
</div>

<!-- ====== PASSWORD GATE SCRIPT ====== -->
<script>
function checkPassword(input) {
  return input === 'VVproduction2026';
}
function unlock() {
  document.getElementById('lock-screen').classList.add('hidden');
  document.getElementById('app-content').classList.add('unlocked');
  sessionStorage.setItem('vv-tracker-auth','true');
  if (typeof fetchAll === 'function') fetchAll();
}
if (sessionStorage.getItem('vv-tracker-auth')==='true') { unlock(); }
document.getElementById('lock-btn').addEventListener('click', tryUnlock);
document.getElementById('lock-input').addEventListener('keydown', e=>{ if(e.key==='Enter') tryUnlock(); });
function tryUnlock() {
  const pw=document.getElementById('lock-input').value;
  if (checkPassword(pw)) { unlock(); }
  else { document.getElementById('lock-error').textContent='Incorrect password. Try again.'; document.getElementById('lock-input').value=''; document.getElementById('lock-input').focus(); }
}
</script>

/* ===== HELPERS ===== */
function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function daysUntil(dateStr) {
  if (!dateStr) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const target = new Date(dateStr + 'T00:00:00'); target.setHours(0,0,0,0);
  return Math.ceil((target - today) / (1000*60*60*24));
}
function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}
function dateUrgencyClass(dateStr) {
  const days = daysUntil(dateStr);
  if (days === null) return 'no-date';
  if (days <= 5) return 'urgent';
  if (days <= 14) return 'soon';
  return 'future';
}
function countdownText(dateStr) {
  const days = daysUntil(dateStr);
  if (days === null) return 'No date set';
  if (days < 0) return Math.abs(days) + 'd ago';
  if (days === 0) return 'TODAY';
  if (days === 1) return 'Tomorrow';
  return days + ' days away';
}

function setSyncMsg(msg) { document.getElementById('sync-msg').textContent = msg; }

/* ===== AIRTABLE API ===== */
async function fetchAll() {
  setSyncMsg('Syncing...');
  try {
    let all=[], offset='';
    do {
      const url = API + '?pageSize=100&returnFieldsByFieldId=true' + (offset ? '&offset='+offset : '');
      const res = await fetch(url, { headers: headers() });
      if (!res.ok) throw new Error('Airtable error: '+res.status);
      const data = await res.json();
      all = all.concat(data.records);
      offset = data.offset || '';
    } while (offset);
    records = all;
    setSyncMsg('Saved ' + new Date().toLocaleTimeString());
    render();
  } catch(e) {
    setSyncMsg('Sync failed: ' + e.message);
    console.error(e);
  }
}

async function updateRecord(recId, fields) {
  setSyncMsg('Syncing...');
  try {
    const res = await fetch(API + '/' + recId, {
      method: 'PATCH',
      headers: headers(),
      body: JSON.stringify({ fields })
    });
    if (!res.ok) throw new Error('Update failed: '+res.status);
    const updated = await res.json();
    const idx = records.findIndex(r => r.id === recId);
    if (idx >= 0) records[idx] = updated;
    setSyncMsg('Saved ' + new Date().toLocaleTimeString());
    render();
  } catch(e) {
    setSyncMsg('Sync failed: ' + e.message);
    console.error(e);
  }
}

async function createRecord(fields) {
  setSyncMsg('Syncing...');
  try {
    const res = await fetch(API, {
      method: 'POST',
      headers: headers(),
      body: JSON.stringify({ fields })
    });
    if (!res.ok) throw new Error('Create failed: '+res.status);
    const created = await res.json();
    records.push(created);
    setSyncMsg('Saved ' + new Date().toLocaleTimeString());
    render();
  } catch(e) {
    setSyncMsg('Sync failed: ' + e.message);
    console.error(e);
  }
}

async function deleteRecord(recId) {
  setSyncMsg('Syncing...');
  try {
    const res = await fetch(API + '/' + recId, { method: 'DELETE', headers: headers() });
    if (!res.ok) throw new Error('Delete failed: '+res.status);
    records = records.filter(r => r.id !== recId);
    setSyncMsg('Saved ' + new Date().toLocaleTimeString());
    render();
  } catch(e) {
    setSyncMsg('Sync failed: ' + e.message);
    console.error(e);
  }
}

/* ===== RECORD HELPERS ===== */
function rv(rec, key) { return rec.fields[F[key]] || ''; }

/* Linked-record helpers for Assignee (now multipleRecordLinks) */
const TEAM_MAP = {
  'Alfred':  'recPzwB4PpqkWCVVf',
  'Vanessa': 'recpCPFXXqRSJaWmC',
  'Kathy':   'recPuV46qPMRF83r7',
  'Alberto': 'recOPXzNKokNC6ivJ',
};
const TEAM_ID_TO_NAME = {};
Object.entries(TEAM_MAP).forEach(([name, id]) => TEAM_ID_TO_NAME[id] = name);

// Get assignee display name(s) from linked record array
// REST API with returnFieldsByFieldId returns linked records as plain ID strings: ["recXXX"]
function getAssignee(rec) {
  const val = rec.fields[F.assignee];
  if (!val) return '';
  if (typeof val === 'string') return TEAM_ID_TO_NAME[val] || val;
  if (Array.isArray(val)) {
    return val.map(v => {
      if (typeof v === 'string') return TEAM_ID_TO_NAME[v] || v;
      // fallback for object format {id, name}
      return TEAM_ID_TO_NAME[v.id] || (v.name || '').split(' ')[0];
    }).join(', ');
  }
  return '';
}

// Get first assignee short name for color matching
function getFirstAssignee(rec) {
  const val = rec.fields[F.assignee];
  if (!val) return '';
  if (typeof val === 'string') return TEAM_ID_TO_NAME[val] || val;
  if (Array.isArray(val) && val.length > 0) {
    const v = val[0];
    if (typeof v === 'string') return TEAM_ID_TO_NAME[v] || v;
    return TEAM_ID_TO_NAME[v.id] || (v.name || '').split(' ')[0];
  }
  return '';
}

// Convert short name to linked record IDs for API writes
// Airtable REST API expects plain string array: ["recXXX"]
function assigneeToLinkedIds(name) {
  if (!name) return [];
  const id = TEAM_MAP[name];
  return id ? [id] : [];
}
function tasksDone(proj) { return recordsForProject(proj).filter(r => rv(r,'status')==='Completed').length; }
function tasksTotal(proj) { return recordsForProject(proj).length; }
function recordsForProject(proj) { return records.filter(r => rv(r,'project') === proj); }

/* ===== SORT PROJECTS BY SHOOT DATE ===== */
function getSortedProjects() {
  return [...projects].sort((a,b) => {
    if (!a.shootDate && !b.shootDate) return 0;
    if (!a.shootDate) return 1;
    if (!b.shootDate) return -1;
    return new Date(a.shootDate) - new Date(b.shootDate);
  });
}

/* ===== STATS ===== */
function updateDash() {
  let total=0, done=0;
  records.forEach(r => { total++; if(rv(r,'status')==='Completed') done++; });
  const pct = total > 0 ? Math.round((done/total)*100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = pct + '%';
  document.getElementById('stat-done').textContent = done + ' done';
  document.getElementById('stat-remaining').textContent = (total-done) + ' remaining';
}

/* ===== FILTER & SORT ===== */
function matchesFilter(rec) {
  const status = rv(rec,'status');
  const pri = rv(rec,'priority');
  const due = rv(rec,'dueDate');
  const done = status === 'Completed';

  if (currentFilter === 'pending' && done) return false;
  if (currentFilter === 'done' && !done) return false;
  if (currentFilter === 'high' && pri !== 'High') return false;
  if (currentFilter === 'overdue') {
    if (done) return false;
    const d = daysUntil(due);
    if (d === null || d >= 0) return false;
  }
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    const text = (rv(rec,'task') + ' ' + rv(rec,'details') + ' ' + getAssignee(rec)).toLowerCase();
    if (!text.includes(q)) return false;
  }
  return true;
}

function sortRecords(recs) {
  const priVal = { High:0, Medium:1, Low:2 };
  return [...recs].sort((a,b) => {
    switch (currentSort) {
      case 'due-asc': {
        const da = rv(a,'dueDate'), db = rv(b,'dueDate');
        if (!da && !db) return 0; if (!da) return 1; if (!db) return -1;
        return new Date(da) - new Date(db);
      }
      case 'due-desc': {
        const da = rv(a,'dueDate'), db = rv(b,'dueDate');
        if (!da && !db) return 0; if (!da) return 1; if (!db) return -1;
        return new Date(db) - new Date(da);
      }
      case 'priority': return (priVal[rv(a,'priority')]??1) - (priVal[rv(b,'priority')]??1);
      case 'assignee': return (getAssignee(a)||'zzz').localeCompare(getAssignee(b)||'zzz');
      case 'name': return (rv(a,'task')||'').localeCompare(rv(b,'task')||'');
      case 'created': return 0;
      default: return 0;
    }
  });
}

function dueBadgeHtml(dueDate) {
  if (!dueDate) return '';
  const days = daysUntil(dueDate);
  let cls = 'due-future', label = formatDate(dueDate);
  if (days < 0) { cls = 'overdue'; label = 'Overdue · ' + formatDate(dueDate); }
  else if (days === 0) { cls = 'due-today'; label = 'Due today'; }
  else if (days === 1) { cls = 'due-soon'; label = 'Due tomorrow'; }
  else if (days <= 3) { cls = 'due-soon'; label = 'Due ' + formatDate(dueDate) + ' (' + days + 'd)'; }
  else { label = 'Due ' + formatDate(dueDate); }
  return '<span class="due-badge ' + cls + '">' + label + '</span>';
}

document.getElementById('search-input').addEventListener('input', e => { searchQuery = e.target.value; renderPanel(); });

/* ===== RENDER ===== */
function render(){ updateDash(); renderTabs(); renderPanel(); }

// Initial load if already authenticated
if (sessionStorage.getItem('vv-tracker-auth')==='true') { fetchAll(); }

// Auto-refresh every 30 seconds
setInterval(fetchAll, 30000);
</script>
